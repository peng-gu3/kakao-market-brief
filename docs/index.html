<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>아침 브리핑</title>
  <style>
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f6f8; color: #111827; line-height: 1.6; }
    header { background: #111827; color: #fff; padding: 28px 18px; }
    main { max-width: 860px; margin: 0 auto; padding: 18px; }
    h1 { margin: 0 0 8px; font-size: 28px; }
    .card { background: #fff; border: 1px solid #d8dee8; border-radius: 8px; padding: 16px; margin: 14px 0; }
    .muted { color: #667085; }
  </style>
</head>
<body>
  <header>
    <main>
      <h1>아침 브리핑</h1>
      <p class="muted">GitHub Pages 연결 확인용 페이지입니다.</p>
    </main>
  </header>
  <main>
    <section class="card">
      <h2>페이지 준비 완료</h2>
      <p>이 주소가 카카오톡 버튼에 연결될 공개 브리핑 페이지입니다.</p>
      <p>다음 단계에서 GitHub Actions에 저장소 쓰기 권한을 허용하면, 매일 아침 최신 지수, 뉴스, 관심후보가 이 페이지에 자동으로 갱신됩니다.</p>
    </section>
  </main>
</body>
</html>
