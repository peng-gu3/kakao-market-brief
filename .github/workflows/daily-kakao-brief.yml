name: Daily Kakao Market Brief

on:
  schedule:
    # GitHub Actions cron uses UTC. 23:10 UTC = 08:10 KST.
    # Avoid minute 0 because scheduled runs can be delayed or dropped near the top of the hour.
    - cron: "10 23 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-kakao-market-brief-${{ github.ref }}
  cancel-in-progress: false

jobs:
  send-brief:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Print schedule context
        run: |
          echo "Trigger: ${{ github.event_name }}"
          echo "UTC now: $(date -u '+%Y-%m-%d %H:%M:%S')"
          echo "KST now: $(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M:%S')"
      - name: Generate web brief
        env:
          SEND_KAKAO: "0"
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          REPORT_CITY: ${{ secrets.REPORT_CITY }}
          REPORT_LAT: ${{ secrets.REPORT_LAT }}
          REPORT_LON: ${{ secrets.REPORT_LON }}
        run: python src/kakao_market_brief.py
      - name: Publish web brief
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          if git diff --cached --quiet; then
            echo "No web brief changes to commit."
          else
            git commit -m "Update latest market brief page"
            git push
          fi
      - name: Send Kakao brief
        env:
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
          KAKAO_CLIENT_SECRET: ${{ secrets.KAKAO_CLIENT_SECRET }}
          KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          REPORT_CITY: ${{ secrets.REPORT_CITY }}
          REPORT_LAT: ${{ secrets.REPORT_LAT }}
          REPORT_LON: ${{ secrets.REPORT_LON }}
        run: python src/kakao_market_brief.py
